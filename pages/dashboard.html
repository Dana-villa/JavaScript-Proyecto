<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institución Educativa ABC · Dashboard Principal</title>
    <link rel="stylesheet" href="../styles/dashEst.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- div: Contenedor genérico para agrupar elementos y aplicarles estilos; class="dashboard": La clase "dashboard" se usa para identificar este contenedor principal y darle estilo a través del CSS. -->
    <div class="dashboard">

        <!-- aside: Define una sección que complementa el contenido principal, class="sidebar": Indica que es la barra lateral del menú. -->
        <aside class="sidebar">

            <!-- div con clase "sidebar-bg": Contenedor para la imagen de fondo de la barra lateral. El atributo "style" aplica estilos directamente ahí. -->
            <div class="sidebar-bg" style="background-image: url('./images/lateral.jpg');"></div>

            <!-- div con clase "sidebar-content": Contiene todo el contenido visible de la barra lateral (el escudo, el menú, el botón de cerrar sesión). -->
            <div class="sidebar-content">

                <!-- div con clase "sidebar-header": Agrupa el encabezado de la barra lateral -->
                <div class="sidebar-header">
                    <!-- img: Inserta una imagen. src es la ruta del archivo, alt es un texto alternativo que se muestra si la imagen no carga; class="sidebar-escudo": Para darle estilo con CSS. -->
                    <img src="../images/escudo.png" alt="Escudo de la Institución Educativa ABC" class="sidebar-escudo">
                </div>

                <!-- nav: Define una sección de navegación con enlaces o botones del menú. -->
                <nav class="sidebar-menu">
                    <!-- ul: Lista no ordenada (viñetas); li: Elemento de la lista (cada opción del menú). -->
                    <ul>
                        <!-- class="menu-item active": "menu-item" es la clase para dar estilo a cada opción del menú. "active" indica que esta opción actualmente; data-path="dashboard": Atributo personalizado que puede ser usado por JavaScript para identificar a qué pantalla navegar. -->
                        <li class="menu-item active" data-path="dashboard">
                            <!-- Icono de la opción del menú. alt vacío ("") significa que es una imagen decorativa, por lo que los lectores de pantalla pueden ignorarla. -->
                            <img src="../images/dashboard.png" alt="" class="menu-icon">
                            <!-- span: Contenedor de texto en línea. Se usa para el texto de la opción del menú. -->
                            <span>Dashboard Principal</span>
                        </li>
                        <!-- Las siguientes opciones del menú siguen la misma estructura que la anterior. No tienen la clase "active", por lo que se ven como opciones no seleccionadas. -->
                        <li class="menu-item" data-path="cursos">
                            <img src="../images/gestioncursos.png" alt="" class="menu-icon">
                            <span>Gestión de Cursos</span>
                        </li>
                        <li class="menu-item" data-path="docentes">
                            <img src="../images/gestiondocentes.png" alt="" class="menu-icon">
                            <span>Gestión de Docentes</span>
                        </li>
                        <li class="menu-item" data-path="lecciones">
                            <img src="../images/contenido.png" alt="" class="menu-icon">
                            <span>Lecciones y Contenidos</span>
                        </li>
                        <li class="menu-item" data-path="admin">
                            <img src="../images/administrador.png" alt="" class="menu-icon">
                            <span>Módulo Administrador</span>
                        </li>
                    </ul>
                </nav>

                <!-- div con clase "sidebar-footer": Pie de la barra lateral, donde va el botón de cerrar sesión. -->
                <div class="sidebar-footer">
                    <!-- div con clase "cerrar-sesion": Contiene el icono y el texto de la opción "Cerrar Sesión". -->
                    <div class="cerrar-sesion">
                        <img src="../images/sesion.png" alt="" class="menu-icon">
                        <span>Cerrar Sesión</span>
                    </div>
                </div>
            </div>  
        </aside> 

        <!-- main: Define el contenido principal y único de la página; class="main-content": Área donde se mostrará el contenido dinámico. -->
        <main class="main-content">
            <!-- header: Encabezado de la sección principal; class="main-header": Contiene elementos como el título de la página, notificaciones y perfil de usuario. -->
            <header class="main-header">
                <!-- div con clase "header-right": Agrupa los elementos que van alineados a la derecha del encabezado. -->
                <div class="header-right">
                    <!-- div con clase "notificacion": Contiene el icono de campana y número de notificaciones. -->
                    <div class="notificacion">
                        <img src="../images/notificacion.png" alt="Icono de notificaciones" class="icon-notification">
                        <!-- span con clase "notificacion-badge": Muestra el número de notificaciones no leídas (3). -->
                        <span class="notificacion-badge">3</span>
                    </div>

                    <!-- div con clase "avatar-container": Contiene la información del usuario (avatar, nombre y un icono de chevron). -->
                    <div class="avatar-container">
                        <img src="../images/hacker.png" alt="Foto de perfil de User Pérez" class="avatar-img">
                        <span class="avatar-nombre">User Pérez</span>
                        <img src="../images/aba.png" alt="Icono de menú desplegable" class="icon-chevron">
                    </div>                   
                </div> 
            </header>
        </main>
    </div>

    <!-- script: Conecta el archivo JavaScript para añadir interactividad a la página -->
    <script src="script.js"></script>
</body>
</html>
